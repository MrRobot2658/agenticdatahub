worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    upstream id_mapping {
        server id-mapping:8000;
    }

    upstream sql_engine {
        server sql-engine:8000;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # 首页
        location = / {
            try_files /index.html =404;
        }

        # 用户应用前端
        location = /app {
            return 302 /app/;
        }

        location /app/ {
            alias /usr/share/nginx/app/;
            index index.html;
        }

        # ID-Mapping → Swagger / API
        location = /ID-Mapping {
            return 302 /ID-Mapping/docs;
        }

        location /ID-Mapping/ {
            rewrite ^/ID-Mapping/(.*)$ /$1 break;
            proxy_pass http://id_mapping;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /ID-Mapping;
        }

        # SQL Engine（支持空格与 %20 两种路径）
        location = "/SQL Engine" {
            return 302 "/SQL Engine/docs";
        }

        location = /SQL%20Engine {
            return 302 /SQL%20Engine/docs;
        }

        location "/SQL Engine/" {
            rewrite "^/SQL Engine/(.*)$" /$1 break;
            proxy_pass http://sql_engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix "/SQL Engine";
        }

        location /SQL%20Engine/ {
            rewrite ^/SQL%20Engine/(.*)$ /$1 break;
            proxy_pass http://sql_engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix "/SQL Engine";
        }

        # 用户导入 → ID-Mapping（需在 users 通用规则之前）
        location = /users/import {
            proxy_pass http://id_mapping/users/import;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SQL Engine API 根路径直通（Swagger Try it out / 便捷调用）
        location ~ ^/(nl-query|templates|query|groups|users|tags)(/.*)?$ {
            proxy_pass http://sql_engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ID-Mapping API 根路径直通
        location ~ ^/(events|mapping|profile|wide|merge-log)(/.*)?$ {
            proxy_pass http://id_mapping;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
